  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

 11.5px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: #1B4FD8; margin-bottom: 14px;\">About<\u002Fp>\n        <h2 style=\"font-size: clamp(1.7rem, 3vw, 2.25rem); font-weight: 800; letter-spacing: -0.025em; color: #111110; line-height: 1.15; margin-bottom: 32px;\">Practical tools,<br>not hype<\u002Fh2>\n        <p style=\"font-size: 16px; color: #3D3D3A; line-height: 1.8; margin-bottom: 20px; font-weight: 400;\">I'm an AI developer focused on building practical business tools rather than chasing hype. My experience includes AI assistants, knowledge systems, phone agents, and business process automation. I enjoy helping businesses explore ways AI can save time, improve customer response speed, and simplify operations.<\u002Fp>\n        <p style=\"font-size: 16px; color: #3D3D3A; line-height: 1.8; font-weight: 400;\">I'm now applying that experience to build practical AI tools that help businesses save time, improve response speed, and simplify operations.<\u002Fp>\n        <div style=\"margin-top: 32px; display: flex; flex-direction: column; gap: 14px;\">\n          <div style=\"display: flex; align-items: flex-start; gap: 12px;\">\n            <div style=\"width: 5px; height: 5px; border-radius: 50%; background: #1B4FD8; flex-shrink: 0; margin-top: 8px;\"><\u002Fdiv>\n            <p style=\"font-size: 14.5px; color: #3D3D3A; line-height: 1.7;\">I focus on solving real business problems, not chasing AI trends.<\u002Fp>\n          <\u002Fdiv>\n          <div style=\"display: flex; align-items: flex-start; gap: 12px;\">\n            <div style=\"width: 5px; height: 5px; border-radius: 50%; background: #1B4FD8; flex-shrink: 0; margin-top: 8px;\"><\u002Fdiv>\n            <p style=\"font-size: 14.5px; color: #3D3D3A; line-height: 1.7;\">Every project starts with understanding your workflow before recommending technology.<\u002Fp>\n          <\u002Fdiv>\n          <div style=\"display: flex; align-items: flex-start; gap: 12px;\">\n            <div style=\"width: 5px; height: 5px; border-radius: 50%; background: #1B4FD8; flex-shrink: 0; margin-top: 8px;\"><\u002Fdiv>\n            <p style=\"font-size: 14.5px; color: #3D3D3A; line-height: 1.7;\">I prefer small, practical implementations that deliver value quickly.<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display: flex; flex-direction: column; gap: 16px; padding-top: 8px;\">\n        <div style=\"background: #F2F2EF; border: 1px solid #E5E5E2; border-radius: 13px; padding: 24px 28px;\">\n          <p style=\"font-size: 12px; font-weight: 600; color: #9B9B96; letter-spacing: 0.04em; text-transform: uppercase; margin-bottom: 6px;\">CURRENTLY<\u002Fp>\n          <p style=\"font-size: 17px; font-weight: 700; color: #111110; letter-spacing: -0.01em;\"><strong data-start=\"273\" data-end=\"289\">AI Developer<\u002Fstrong><br data-start=\"289\" data-end=\"292\"><\u002Fp>\n          <p style=\"font-size: 14px; color: #5C5C58; margin-top: 4px;\"><\u002Fp><p data-start=\"257\" data-end=\"350\">Building AI assistants, knowledge systems, and automations<\u002Fp>\n<p data-start=\"352\" data-end=\"355\"><\u002Fp><p><\u002Fp>\n        <\u002Fdiv>\n        <div style=\"background: #F2F2EF; border: 1px solid #E5E5E2; border-radius: 13px; padding: 24px 28px;\">\n          <p style=\"font-size: 12px; font-weight: 600; color: #9B9B96; letter-spacing: 0.04em; text-transform: uppercase; margin-bottom: 6px;\">Focus area<\u002Fp>\n          <p style=\"font-size: 17px; font-weight: 700; color: #111110; letter-spacing: -0.01em;\">Business AI Tools<\u002Fp>\n          <p style=\"font-size: 14px; color: #5C5C58; margin-top: 4px;\">Voice · Knowledge · Automation<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"background: #F2F2EF; border: 1px solid #E5E5E2; border-radius: 13px; padding: 24px 28px;\">\n          <p style=\"font-size: 12px; font-weight: 600; color: #9B9B96; letter-spacing: 0.04em; text-transform: uppercase; margin-bottom: 6px;\">Approach<\u002Fp>\n          <p style=\"font-size: 15px; font-weight: 500; color: #3D3D3A; line-height: 1.6; letter-spacing: -0.01em;\">Ship fast, test with real data, iterate until it works.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- FINAL CTA -->\n<section id=\"contact\" style=\"padding: 112px 28px; background: #0E1016;\">\n  <div style=\"max-width: 1100px; margin: 0 auto; text-align: center;\">\n    <h2 style=\"font-size: clamp(2rem, 4.5vw, 3.5rem); font-weight: 800; letter-spacing: -0.035em; color: #FFFFFF; margin-bottom: 22px; max-width: 640px; margin-left: auto; margin-right: auto; line-height: 1.1;\">\n      Want to see what AI could do for your business?\n    <\u002Fh2>\n    <p style=\"font-size: 17px; color: rgba(255,255,255,0.45); margin-bottom: 48px; line-height: 1.7; font-weight: 400; max-width: 420px; margin-left: auto; margin-right: auto;\">\n      No pitch decks. No vague promises. Just a quick conversation about what's actually possible.\n    <\u002Fp>\n    <div style=\"display: flex; justify-content: center; gap: 12px; flex-wrap: wrap;\">\n      <a href=\"#demos\" style=\"display: inline-flex; align-items: center; background: #1B4FD8; color: #FFFFFF; padding: 15px 32px; border-radius: 9px; font-size: 15px; font-weight: 600; text-decoration: none; letter-spacing: -0.01em;\">\n        Try a Demo\n      <\u002Fa>\n      <a href=\"mailto:hello@yourdomain.com\" style=\"display: inline-flex; align-items: center; background: transparent; color: #FFFFFF; border: 1.5px solid rgba(255,255,255,0.2); padding: 15px 32px; border-radius: 9px; font-size: 15px; font-weight: 600; text-decoration: none; letter-spacing: -0.01em;\">\n        Book a Call\n      <\u002Fa>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- FOOTER -->\n<footer style=\"padding: 28px; background: #080A10; border-top: 1px solid rgba(255,255,255,0.05);\">\n  <div style=\"max-width: 1100px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 12px;\">\n    \n    <span style=\"font-size: 13px; color: rgba(255,255,255,0.25);\">© 2026<\u002Fspan>\n  <\u002Fdiv>\n<\u002Ffooter>\n\n\n<sc-if value=\"{{ receptionistModalOpen }}\" hint-placeholder-val=\"{{ false }}\">\n  <div onclick=\"{{ closeReceptionistModal }}\" style=\"position: fixed; inset: 0; background: rgba(17,17,16,0.6); display: flex; align-items: center; justify-content: center; z-index: 1000; padding: 24px;\">\n    <div onclick=\"{{ stopPropagation }}\" style=\"background: #FFFFFF; border: 1px solid #E5E5E2; border-radius: 16px; padding: 36px 32px; max-width: 420px; width: 100%; box-shadow: 0 20px 60px rgba(17,17,16,0.25);\">\n      <h3 style=\"font-size: 20px; font-weight: 800; color: #111110; letter-spacing: -0.02em; margin-bottom: 14px;\">AI Receptionist Demo<\u002Fh3>\n      <p style=\"font-size: 14.5px; color: #5C5C58; line-height: 1.7; margin-bottom: 24px;\">Call the demo receptionist and try asking it to book an appointment, ask about business hours, request pricing, or speak with a representative.<\u002Fp>\n      <div style=\"display: inline-flex; align-items: center; background: #EEF2FD; color: #1B4FD8; font-size: 17px; font-weight: 700; padding: 10px 18px; border-radius: 8px; letter-spacing: -0.01em; margin-bottom: 28px;\">+18324021624<\u002Fdiv>\n      <div style=\"display: flex; gap: 10px; flex-wrap: wrap;\">\n        <a href=\"tel:+18324021624\" style=\"display: inline-flex; align-items: center; justify-content: center; gap: 6px; flex: 1; background: #1B4FD8; color: #FFFFFF; padding: 12px 20px; border-radius: 9px; font-size: 14.5px; font-weight: 600; text-decoration: none; letter-spacing: -0.01em;\">📞 Call Now<\u002Fa>\n        <button onclick=\"{{ closeReceptionistModal }}\" style=\"display: inline-flex; align-items: center; justify-content: center; flex: 1; background: transparent; color: #111110; border: 1.5px solid #D8D8D4; padding: 12px 20px; border-radius: 9px; font-size: 14.5px; font-weight: 600; cursor: pointer; letter-spacing: -0.01em; font-family: inherit;\">Close<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsc-if>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  state = { voiceOpen: false, receptionistModalOpen: false };\n  renderVals() {\n    const open = this.state.voiceOpen;\n    return {\n      voiceOpen: open,\n      toggleVoice: () => this.setState(s => ({ voiceOpen: !s.voiceOpen })),\n      voiceChevron: open ? 'rotate(45deg)' : 'rotate(0deg)',\n      voiceMargin: open ? '0' : undefined,\n      receptionistModalOpen: this.state.receptionistModalOpen,\n      openReceptionistModal: (e) => { if (e) e.preventDefault(); this.setState({ receptionistModalOpen: true }); },\n      closeReceptionistModal: () => this.setState({ receptionistModalOpen: false }),\n      stopPropagation: (e) => { if (e) e.stopPropagation(); },\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
